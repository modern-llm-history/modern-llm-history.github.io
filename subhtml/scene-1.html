<time>2018-01 – 2020-05</time>
<h2>前提の転換</h2>
<p>
  2019年のGPT-2、2020年のGPT-3はこの感触を決定的なものにしました。
  モデル・データ・compute を素直に増やすだけで loss もベンチマークもきれいに改善し、
  few-shot / zero-shot のような「事前学習済みモデルをその場で使う」スタイルが現実味を帯びます。
</p>
<p>
  つまりこの時期の転換は、単にモデルが強くなったことではありません。
  研究者や開発者の側が「まず pretrain するのが当然だ」という新しい常識に移行したこと自体が大きかったのです。
</p>
